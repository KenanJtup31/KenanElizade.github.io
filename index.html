<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>CineFlow AI</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .movie-card { background: #1e293b; padding: 15px; border-radius: 10px; margin: 10px 0; }
        #kenano-chat { border-top: 2px solid gold; margin-top: 20px; padding-top: 10px; }
    </style>
</head>
<body>
    <h1>🎬 CineFlow AI</h1>
    <p>Developed by Kenan Elizade</p>
    
    <div id="movies">
        <div class="movie-card"><h3>Dune: Part Two</h3><p>IMDB: 8.5</p></div>
    </div>

    <div id="kenano-chat">
        <h3>🤖 Kenano Assistant</h3>
        <input type="text" id="user-msg" placeholder="Film sonluğunu soruş...">
        <button onclick="askKenano()">Soruş</button>
        <p id="response"></p>
    </div>

    <script>
        async function askKenano() {
            const msg = document.getElementById('user-msg').value;
            document.getElementById('response').innerText = "Kenano düşünür...";
            
            // API sorğusu (Groq)
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer 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",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{role: "user", content: msg}]
                })
            });
            const data = await response.json();
            document.getElementById('response').innerText = data.choices[0].message.content;
        }
    </script>
</body>
</html>
