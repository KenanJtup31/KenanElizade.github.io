<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>CineFlow AI - Kenano</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        #kenano-box { background: white; color: black; padding: 20px; border-radius: 15px; max-width: 400px; margin: 20px auto; }
        #response { background: #f0f0f0; padding: 10px; margin-top: 10px; border-radius: 5px; min-height: 50px; text-align: left; }
    </style>
</head>
<body>

    <h1>🎬 CineFlow AI</h1>
    <p>Developed by Kenan Elizade</p>

    <div id="kenano-box">
        <h3>🤖 Kenano Assistant</h3>
        <input type="text" id="user-msg" placeholder="Filmin sonunu soruş..." style="width: 80%; padding: 5px;">
        <button onclick="askKenano()">Göndər</button>
        <div id="response">Kenano hazırdır...</div>
    </div>

    <script>
        async function askKenano() {
            const msg = document.getElementById('user-msg').value;
            const resDiv = document.getElementById('response');
            resDiv.innerText = "Kenano düşünür...";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer 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",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "user", content: "Sən Kenano adlı film mütəxəssisisən. Bu sualı cavablandır: " + msg}]
                    })
                });
                const data = await response.json();
                resDiv.innerText = data.choices[0].message.content;
            } catch (error) {
                resDiv.innerText = "Xəta baş verdi, API açarını və ya interneti yoxla.";
            }
        }
    </script>
</body>
</html>
